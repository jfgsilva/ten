# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ten

before:
  hooks:
    - go mod tidy

builds:
  - id: ten
    main: ./cmd/ten
    binary: ten
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: ten
    builds:
      - ten
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

dockers:
  - id: ten-amd64
    ids:
      - ten
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - ghcr.io/jfgsilva/ten:{{ .Version }}-amd64
      - ghcr.io/jfgsilva/ten:{{ .Major }}.{{ .Minor }}-amd64
    build_flag_templates:
      - --platform=linux/amd64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.source=https://github.com/jfgsilva/ten

  - id: ten-arm64
    ids:
      - ten
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - ghcr.io/jfgsilva/ten:{{ .Version }}-arm64
      - ghcr.io/jfgsilva/ten:{{ .Major }}.{{ .Minor }}-arm64
    build_flag_templates:
      - --platform=linux/arm64
      - --label=org.opencontainers.image.title={{ .ProjectName }}
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.created={{ .Date }}
      - --label=org.opencontainers.image.revision={{ .FullCommit }}
      - --label=org.opencontainers.image.source=https://github.com/jfgsilva/ten

docker_manifests:
  - name_template: ghcr.io/jfgsilva/ten:{{ .Version }}
    image_templates:
      - ghcr.io/jfgsilva/ten:{{ .Version }}-amd64
      - ghcr.io/jfgsilva/ten:{{ .Version }}-arm64

  - name_template: ghcr.io/jfgsilva/ten:{{ .Major }}.{{ .Minor }}
    image_templates:
      - ghcr.io/jfgsilva/ten:{{ .Major }}.{{ .Minor }}-amd64
      - ghcr.io/jfgsilva/ten:{{ .Major }}.{{ .Minor }}-arm64

  - name_template: ghcr.io/jfgsilva/ten:latest
    image_templates:
      - ghcr.io/jfgsilva/ten:{{ .Version }}-amd64
      - ghcr.io/jfgsilva/ten:{{ .Version }}-arm64
