name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test, and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache: true

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" ./cmd/ten

      - name: Test with coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./internal/...
          go tool cover -func=coverage.out

          check_threshold() {
            pkg="$1"; threshold="$2"
            pct=$(go tool cover -func=coverage.out \
                  | grep "^${pkg}" \
                  | awk 'END {gsub(/%/,"",$NF); print $NF}')
            ok=$(awk -v p="$pct" -v t="$threshold" 'BEGIN{print (p+0>=t+0)?"yes":"no"}')
            if [ "$ok" != "yes" ]; then
              echo "FAIL: ${pkg} coverage ${pct}% < ${threshold}%"; exit 1
            fi
            echo "OK: ${pkg} ${pct}% >= ${threshold}%"
          }

          check_threshold "github.com/jfgsilva/ten/internal/api"    72
          check_threshold "github.com/jfgsilva/ten/internal/config" 78
          check_threshold "github.com/jfgsilva/ten/internal/prompt" 82

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out

      - name: Test cmd (integration)
        run: go test ./cmd/ten/...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec ./...

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
